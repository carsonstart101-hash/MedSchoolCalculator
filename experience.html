<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maddy's Experience Logger</title>
    <style>
        :root {
            --primary: #2d3436;
            --accent: #6c5ce7;
            --clinical: #0984e3;
            --shadowing: #00cec9;
            --volunteer: #fdcb6e;
            --research: #e84393;
            --bg: #f9f9fb;
            --card-bg: #ffffff;
            --text-muted: #636e72;
            --border-light: #edf2f7;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        header {
            text-align: center;
            padding: 30px 0;
        }

        h1 { margin: 0; font-size: 2.2rem; letter-spacing: -1px; }
        .subtitle { color: var(--text-muted); margin-top: 10px; }

        /* Hours Dashboard Grid */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .dash-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border-bottom: 4px solid var(--accent);
        }

        .dash-card.clinical { border-color: var(--clinical); }
        .dash-card.shadowing { border-color: var(--shadowing); }
        .dash-card.volunteer { border-color: var(--volunteer); }
        .dash-card.research { border-color: var(--research); }

        .dash-label { font-size: 0.8rem; text-transform: uppercase; font-weight: bold; color: var(--text-muted); }
        .dash-value { font-size: 2rem; font-weight: bold; margin-top: 5px; color: var(--primary); }

        /* Input Form */
        .admin-panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .form-title {
            margin-top: 0;
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .input-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        .full-width { grid-column: 1 / -1; }

        .field { display: flex; flex-direction: column; }
        label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
        
        input, select, textarea {
            padding: 12px;
            border: 2px solid var(--border-light);
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus { border-color: var(--accent); }

        textarea { resize: vertical; min-height: 80px; }

        .btn-add {
            grid-column: 1 / -1;
            background: var(--accent);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
            margin-top: 5px;
        }

        .btn-add:hover { opacity: 0.9; }

        /* Experience Log Cards */
        .log-list { display: grid; gap: 20px; }

        .log-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border: 1px solid var(--border-light);
            position: relative;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .log-title { margin: 0; font-size: 1.3rem; }
        .log-org { color: var(--text-muted); font-size: 0.95rem; margin: 5px 0 0; }

        .tag {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }

        .tag.clinical { background-color: var(--clinical); }
        .tag.shadowing { background-color: var(--shadowing); }
        .tag.volunteer { background-color: var(--volunteer); }
        .tag.research { background-color: var(--research); }

        .log-stats {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-light);
        }

        .stat { font-size: 0.9rem; font-weight: bold; }
        .stat span { color: var(--text-muted); font-weight: normal; margin-right: 5px; }

        .reflection-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 10px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: #334155;
            border-left: 3px solid var(--accent);
        }

        .delete-btn {
            background: transparent;
            color: #ff7675;
            border: 1px solid #ff7675;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            position: absolute;
            top: 25px;
            right: 25px;
        }

        .delete-btn:hover { background: #ff7675; color: white; }

        @media (max-width: 600px) {
            .input-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AMCAS Experience Logger 📋</h1>
        <p class="subtitle">Track your hours and write your reflections before application season!</p>
    </header>

    <!-- Hours Dashboard -->
    <div class="dashboard">
        <div class="dash-card clinical">
            <div class="dash-label">Clinical Hours</div>
            <div class="dash-value" id="tot-clinical">0</div>
        </div>
        <div class="dash-card shadowing">
            <div class="dash-label">Shadowing</div>
            <div class="dash-value" id="tot-shadowing">0</div>
        </div>
        <div class="dash-card volunteer">
            <div class="dash-label">Volunteering</div>
            <div class="dash-value" id="tot-volunteer">0</div>
        </div>
        <div class="dash-card research">
            <div class="dash-label">Research</div>
            <div class="dash-value" id="tot-research">0</div>
        </div>
    </div>

    <!-- Input Form -->
    <div class="admin-panel">
        <div class="form-title">➕ Log a New Experience</div>
        <div class="input-grid">
            <div class="field">
                <label>Category</label>
                <select id="category">
                    <option value="clinical">Clinical / Paid Patient Care</option>
                    <option value="shadowing">Physician Shadowing</option>
                    <option value="volunteer">Community Service / Volunteering</option>
                    <option value="research">Research / Lab</option>
                </select>
            </div>
            <div class="field">
                <label>Role / Title</label>
                <input type="text" id="role" placeholder="e.g. Medical Scribe">
            </div>
            <div class="field">
                <label>Organization / Doctor</label>
                <input type="text" id="org" placeholder="e.g. Mercy Hospital">
            </div>
            <div class="field">
                <label>Date Range</label>
                <input type="text" id="dates" placeholder="e.g. May 2024 - Present">
            </div>
            <div class="field">
                <label>Total Hours Completed</label>
                <input type="number" id="hours" placeholder="0">
            </div>
            <div class="field full-width">
                <label>Reflection (Most Meaningful Interaction)</label>
                <textarea id="reflection" placeholder="Describe what you learned or a patient interaction that stood out to you. This will save you when writing your personal statement!"></textarea>
            </div>
            <button class="btn-add" onclick="saveExperience()">Save to Log</button>
        </div>
    </div>

    <!-- Feed of Logged Experiences -->
    <div id="logArea" class="log-list"></div>
</div>

<script>
    // Load from Maddy's browser storage specifically for experiences
    let experiences = JSON.parse(localStorage.getItem('maddy_experiences')) || [];

    function saveExperience() {
        const category = document.getElementById('category').value;
        const role = document.getElementById('role').value;
        const org = document.getElementById('org').value;
        const dates = document.getElementById('dates').value;
        const hours = parseInt(document.getElementById('hours').value) || 0;
        const reflection = document.getElementById('reflection').value;

        if(!role || !org) return alert("Please enter your Role and the Organization!");

        experiences.push({ category, role, org, dates, hours, reflection });
        localStorage.setItem('maddy_experiences', JSON.stringify(experiences));
        
        // Clear form
        document.getElementById('role').value = "";
        document.getElementById('org').value = "";
        document.getElementById('dates').value = "";
        document.getElementById('hours').value = "";
        document.getElementById('reflection').value = "";

        render();
    }

    function deleteExp(index) {
        if(confirm("Delete this experience?")) {
            experiences.splice(index, 1);
            localStorage.setItem('maddy_experiences', JSON.stringify(experiences));
            render();
        }
    }

    function render() {
        const display = document.getElementById('logArea');
        display.innerHTML = "";

        // Reset counters
        let totals = { clinical: 0, shadowing: 0, volunteer: 0, research: 0 };

        // Reverse the array so the newest entries show up at the top
        [...experiences].reverse().forEach((exp, revIndex) => {
            const originalIndex = experiences.length - 1 - revIndex;
            
            // Add to totals
            if(totals[exp.category] !== undefined) {
                totals[exp.category] += exp.hours;
            }

            // Capitalize category for tag
            const catName = exp.category === 'volunteer' ? 'Volunteering' : exp.category;

            display.innerHTML += `
                <div class="log-card">
                    <button class="delete-btn" onclick="deleteExp(${originalIndex})">Delete</button>
                    <div class="log-header">
                        <div>
                            <h3 class="log-title">${exp.role}</h3>
                            <p class="log-org">${exp.org}</p>
                        </div>
                        <span class="tag ${exp.category}">${catName}</span>
                    </div>
                    <div class="log-stats">
                        <div class="stat"><span>Dates:</span> ${exp.dates || "N/A"}</div>
                        <div class="stat"><span>Hours:</span> ${exp.hours}</div>
                    </div>
                    ${exp.reflection ? `
                        <div class="reflection-box">
                            <strong>Reflection:</strong><br>
                            ${exp.reflection}
                        </div>
                    ` : ''}
                </div>
            `;
        });

        // Update the dashboard numbers
        document.getElementById('tot-clinical').innerText = totals.clinical;
        document.getElementById('tot-shadowing').innerText = totals.shadowing;
        document.getElementById('tot-volunteer').innerText = totals.volunteer;
        document.getElementById('tot-research').innerText = totals.research;
    }

    // Run on load
    render();
</script>

</body>
</html>
