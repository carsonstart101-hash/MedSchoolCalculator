<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maddy's Permanent Med School Tracker</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --accent: #70a1ff;
            --danger: #ff4757;
            --success: #2ed573;
            --bg: #f1f2f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 800px; }

        header { text-align: center; margin-bottom: 30px; color: var(--primary); }

        /* Input Form Styling */
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 25px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .form-group { display: flex; flex-direction: column; }

        label { font-size: 11px; font-weight: bold; margin-bottom: 5px; color: #57606f; text-transform: uppercase; }

        input {
            padding: 12px;
            border: 1px solid #dfe4ea;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .btn-save {
            grid-column: 1 / -1;
            background: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-save:hover { background: #001a4d; }

        /* School List Styling */
        .school-item {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid var(--accent);
            animation: fadeIn 0.4s ease;
        }

        .school-info h3 { margin: 0; color: var(--primary); font-size: 1.2rem; }
        .school-info p { margin: 4px 0 0; color: #747d8c; font-size: 0.9rem; }

        .stats-row { display: flex; gap: 20px; align-items: center; }

        .stat-group { text-align: center; }
        .stat-label { font-size: 10px; color: #a4b0be; text-transform: uppercase; }
        .stat-val { font-weight: bold; color: #2f3542; }

        .total-box { color: var(--success); font-size: 1.1rem; }

        .btn-delete {
            background: none;
            border: 1px solid #ffcccb;
            color: var(--danger);
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 15px;
        }

        .btn-delete:hover { background: var(--danger); color: white; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Future Dr. Maddy's Database 🧬</h1>
        <p>Data is automatically saved to your browser.</p>
    </header>

    <!-- Add School Form -->
    <div class="card">
        <div class="form-grid">
            <div class="form-group">
                <label>Medical School</label>
                <input type="text" id="name" placeholder="e.g. Stanford Medicine">
            </div>
            <div class="form-group">
                <label>City & State</label>
                <input type="text" id="city" placeholder="e.g. Stanford, CA">
            </div>
            <div class="form-group">
                <label>Tuition ($)</label>
                <input type="number" id="tuition" placeholder="0">
            </div>
            <div class="form-group">
                <label>Living Cost ($)</label>
                <input type="number" id="living" placeholder="0">
            </div>
            <div class="form-group">
                <label>Acceptance %</label>
                <input type="text" id="accept" placeholder="2.5%">
            </div>
            <button class="btn-save" onclick="addAndSave()">Add School to Database</button>
        </div>
    </div>

    <!-- The List -->
    <div id="schoolContainer"></div>
</div>

<script>
    // 1. Load data from LocalStorage immediately when the page opens
    let mySchools = JSON.parse(localStorage.getItem('maddyMedSchools')) || [
        { name: "NYU Grossman", city: "New York, NY", tuition: 0, living: 35000, acceptance: "2.1%" }
    ];

    function addAndSave() {
        const name = document.getElementById('name').value;
        const city = document.getElementById('city').value;
        const tuition = parseInt(document.getElementById('tuition').value) || 0;
        const living = parseInt(document.getElementById('living').value) || 0;
        const acceptance = document.getElementById('accept').value || "N/A";

        if (!name) return alert("Please enter a school name!");

        // Add to our array
        mySchools.push({ name, city, tuition, living, acceptance });

        // 2. SAVE to LocalStorage (Turn the array into a string)
        localStorage.setItem('maddyMedSchools', JSON.stringify(mySchools));

        // Clear form and refresh list
        document.querySelectorAll('input').forEach(i => i.value = "");
        render();
    }

    function deleteSchool(index) {
        mySchools.splice(index, 1);
        localStorage.setItem('maddyMedSchools', JSON.stringify(mySchools));
        render();
    }

    function render() {
        const container = document.getElementById('schoolContainer');
        container.innerHTML = "";

        mySchools.forEach((s, index) => {
            const total = s.tuition + s.living;
            container.innerHTML += `
                <div class="school-item">
                    <div class="school-info">
                        <h3>${s.name}</h3>
                        <p>${s.city}</p>
                    </div>
                    <div class="stats-row">
                        <div class="stat-group">
                            <div class="stat-label">Acceptance</div>
                            <div class="stat-val">${s.acceptance}</div>
                        </div>
                        <div class="stat-group">
                            <div class="stat-label">Total / Yr</div>
                            <div class="stat-val total-box">$${total.toLocaleString()}</div>
                        </div>
                        <button class="btn-delete" onclick="deleteSchool(${index})">Delete</button>
                    </div>
                </div>
            `;
        });
    }

    // Initial load
    render();
</script>

</body>
</html>
